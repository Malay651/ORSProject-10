version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: ors-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: project10
      MYSQL_USER: orsuser
      MYSQL_PASSWORD: orspass
      
    ports:
      - "3307:3306"
      
    volumes:
      - mysql-data:/var/lib/mysql
      
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ors-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATASOURCE_URL: jdbc:mysql://mysql:3306/project10
      DATASOURCE_USERNAME: root
      DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../../frontend/ORSPROJECT-10-UI
      dockerfile: Dockerfile
    container_name: ors-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  mysql-data: